name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            build_method: native
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            build_method: cross
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            build_method: musl-tools
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (x86_64 Linux)
        if: matrix.build_method == 'musl-tools'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.build_method == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.build_method != 'cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.build_method == 'cross'
        run: cross build --release --target ${{ matrix.target }}

      - name: Create archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="senko-${TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" senko
          if command -v sha256sum &> /dev/null; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: senko-${{ matrix.target }}
          path: |
            senko-*.tar.gz
            senko-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --generate-notes \
            senko-*.tar.gz senko-*.tar.gz.sha256
